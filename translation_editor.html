<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史文獻三欄式編輯器</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, var(--accent-glow), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 2rem;
            flex: 1;
            max-width: 1800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .panel:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .panel-icon {
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }

        textarea {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            padding: 1rem;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        /* Custom Scrollbar for textareas */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border-color);
            position: sticky;
            bottom: 0;
            z-index: 10;
            backdrop-filter: blur(12px);
        }

        button {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--success);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .panel {
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>文獻編輯器 (三欄式)</h1>
        <p>將原文、譯文與解釋填入，點擊複製後貼上至 Markdown 檔案中</p>
    </div>

    <div class="container">
        <div class="panel">
            <div class="panel-header">
                <span class="panel-icon">📜</span>
                <h2 class="panel-title">原文 (德文/外文)</h2>
            </div>
            <textarea id="original" placeholder="在此貼上原始文獻內容..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-icon">📝</span>
                <h2 class="panel-title">譯文 (繁體中文)</h2>
            </div>
            <textarea id="translation" placeholder="在此輸入或貼上翻譯內容..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-icon">💡</span>
                <h2 class="panel-title">解釋 (註解與分析)</h2>
            </div>
            <textarea id="explanation" placeholder="在此填寫針對該段落的歷史背景解釋、名詞註解等..."></textarea>
        </div>
    </div>

    <div class="actions">
        <button class="btn-secondary" onclick="clearFields()">
            <span>🗑️</span> 清空內容
        </button>
        <button class="btn-primary" onclick="copyMarkdown()">
            <span>📋</span> 複製 Markdown 區塊
        </button>
    </div>

    <div id="toast" class="toast">✅ 已成功複製 Markdown 代碼！</div>

    <script>
        function copyMarkdown() {
            const original = document.getElementById('original').value.trim();
            const translation = document.getElementById('translation').value.trim();
            const explanation = document.getElementById('explanation').value.trim();

            if (!original && !translation && !explanation) {
                alert('請至少填寫一個欄位！');
                return;
            }

            let markdown = "\n---\n\n";
            
            if (original) {
                markdown += "**原文**\n\n" + original + "\n\n";
            }
            if (translation) {
                markdown += "**譯文**\n\n" + translation + "\n\n";
            }
            if (explanation) {
                markdown += "**解釋**\n\n" + explanation + "\n\n";
            }

            // Copy to clipboard
            navigator.clipboard.writeText(markdown).then(() => {
                showToast();
            }).catch(err => {
                console.error('Failed to copy: ', err);
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = markdown;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast();
                } catch (err) {
                    alert('複製失敗，請手動複製。');
                }
                document.body.removeChild(textArea);
            });
        }

        function clearFields() {
            if (confirm('確定要清空所有內容嗎？')) {
                document.getElementById('original').value = '';
                document.getElementById('translation').value = '';
                document.getElementById('explanation').value = '';
                document.getElementById('original').focus();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
